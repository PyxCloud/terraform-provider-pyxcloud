name: Release

on:
  # Local-devops mode: automatic GitHub Actions triggers are disabled.
  # Run pyxflow locally, or dispatch this workflow manually if explicitly approved.
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing git tag to release, for example v0.1.5"
        required: true
        type: string
permissions:
  contents: write

concurrency:
  group: terraform-provider-pyxcloud-release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release ref
        id: ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ref=refs/tags/${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.ref }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout release tag
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ steps.ref.outputs.ref }}

      - name: Verify tag checkout
        run: |
          tag="${GITHUB_REF_NAME}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          fi
          current="$(git describe --tags --exact-match)"
          if [ "$current" != "$tag" ]; then
            echo "Checked out $current, expected $tag"
            exit 1
          fi

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

      - name: Setup GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          install-only: true

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: goreleaser release --clean --skip=sign
