name: ci
on:
  # Local-devops mode: automatic GitHub Actions triggers are disabled.
  # Run pyxflow locally, or dispatch this workflow manually if explicitly approved.
  workflow_dispatch:
jobs:
  check-and-test:
    runs-on:
      - self-hosted
      - pyxflow
      - linux-x64
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: setup go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: build/vet/test
        run: go vet ./... && go test ./...
