name: ci
on:
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  check-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: setup go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: build/vet/test
        run: go vet ./... && go test ./...
